:root{--green:#1D9E75;--gl:#E1F5EE;--gd:#085041;--gm:#5DCAA5;--text:#1a1a1a;--muted:#6b7280;--bg:#fafaf8;--white:#fff;--border:rgba(0,0,0,.08);--r:16px;--rs:10px;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);direction:rtl}
    @media (min-width: 769px) { body { zoom: 1.2; } }

.breadcrumb{padding:14px 40px;font-size:13px;color:var(--muted);background:var(--white);border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center;}

.breadcrumb span:last-child{color:var(--text);font-weight:500;}

.page-header{background:var(--white);border-bottom:1px solid var(--border);padding:28px 40px 28px;}
.page-header h1{font-family:'Nunito',sans-serif;font-size:30px;font-weight:800;margin-bottom:6px;}
.page-header h1 span{color:var(--green);}
.page-header p{font-size:14px;color:var(--muted);line-height:1.7;margin:0;}

.main{max-width:820px;margin:0 auto;padding:24px 40px 80px;}
.search-wrap{position:relative;margin-bottom:20px;}
.search-input{width:100%;padding:14px 48px 14px 20px;border-radius:32px;border:2px solid var(--gm);font-family:'Heebo',sans-serif;font-size:15px;color:var(--text);outline:none;background:var(--gl);transition:border-color .15s, box-shadow .15s;direction:rtl;}
.search-input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(29,158,117,.12);}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none;color:var(--green);}
.clear-btn{position:absolute;left:44px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:14px;color:var(--muted);padding:4px;display:none;}
.clear-btn.show{display:block;}
.level-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.ltab{padding:7px 18px;border-radius:20px;font-size:13px;font-weight:600;border:1.5px solid var(--border);background:var(--white);color:var(--muted);cursor:pointer;transition:all .15s;user-select:none;}
.ltab.active{background:var(--green);color:#fff;border-color:var(--green);}
.ltab:hover:not(.active){border-color:var(--gm);color:var(--green);}
.results-label{font-size:13px;color:var(--muted);margin-bottom:16px;height:18px;}

.result-card{background:var(--white);border-radius:var(--r);border:1px solid var(--border);padding:16px 20px;margin-bottom:10px;display:flex;align-items:flex-start;gap:14px;text-decoration:none;color:inherit;transition:all .18s;}
.result-card:hover{border-color:var(--gm);box-shadow:0 4px 16px rgba(29,158,117,.1);transform:translateY(-1px);}
.rc-badge{flex-shrink:0;width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;letter-spacing:.3px;}
.rc-badge.a1{background:#e0f2fe;color:#0369a1;}
.rc-badge.a2{background:#fce7f3;color:#9d174d;}
.rc-badge.b1{background:var(--gl);color:var(--gd);}
.rc-badge.b2{background:#fdf4ff;color:#7e22ce;}
.rc-badge.c1{background:#ede9fe;color:#4f46e5;}
.rc-badge.gen{background:#f3f4f6;color:#4b5563;}
.rc-body{flex:1;min-width:0;}
.rc-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rc-title mark{background:#fef9c3;color:inherit;border-radius:2px;padding:0 1px;}
.rc-desc{font-size:13px;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.rc-desc mark{background:#fef9c3;color:inherit;border-radius:2px;padding:0 1px;}
.rc-arrow{color:var(--muted);font-size:16px;flex-shrink:0;align-self:center;}

.no-results{text-align:center;padding:60px 20px;color:var(--muted);}
.no-results .nr-emoji{font-size:3rem;margin-bottom:12px;}
.no-results h3{font-size:17px;font-weight:700;color:var(--text);margin-bottom:6px;}
.no-results p{font-size:14px;}

.section-label{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:24px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border);}

footer{text-align:center;padding:28px 24px;border-top:1px solid var(--border);font-size:13px;color:var(--muted);}
footer a{color:var(--green);text-decoration:none;}

@media(max-width:768px){
  .breadcrumb{padding:12px 20px;}
  .page-header{padding:22px 20px;}
  .main{padding:20px 16px 60px;}

// ─── לוגיקת חיפוש ───
let activeLevel = "all";
let query = "";

// השתמש ב-SEARCH_INDEX אם זמין, אחרת fallback ל-INDEX הישן
const DATA = (typeof SEARCH_INDEX !== 'undefined') ? SEARCH_INDEX : INDEX_LEGACY;

function escape(str) {
  return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function highlight(text, q) {
  if (!q) return text;
  const re = new RegExp(`(${escape(q)})`, 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function snippet(text, q, maxLen = 160) {
  if (!q || !text) return text ? text.slice(0, maxLen) + '…' : '';
  const lq = q.toLowerCase();
  const idx = text.toLowerCase().indexOf(lq);
  if (idx === -1) return text.slice(0, maxLen) + '…';
  const start = Math.max(0, idx - 60);
  const end   = Math.min(text.length, idx + q.length + 100);
  const raw   = (start > 0 ? '…' : '') + text.slice(start, end) + (end < text.length ? '…' : '');
  return highlight(raw, q);
}

function score(item, q) {
  if (!q) return 1;
  const lq = q.toLowerCase();
  if (item.title.toLowerCase().includes(lq)) return 3;
  if (item.text  && item.text.toLowerCase().includes(lq)) return 1;
  return 0;
}

function render() {
  const q    = query.trim().toLowerCase();
  const grid  = document.getElementById("results");
  const label = document.getElementById("resultsLabel");
  document.getElementById("clearBtn").classList.toggle("show", q.length > 0);

  if (!q) {
    grid.innerHTML = `<div class="no-results">
      <div class="nr-emoji">🔍</div>
      <h3>הקלידו מילה לחיפוש</h3>
      <p>בעברית, בצ׳כית, או שם הנושא — למשל: קניון, Dativ, עבר, muset</p>
    </div>`;
    label.textContent = "";
    return;
  }

  let items = DATA.filter(item => {
    if (activeLevel !== "all" && item.level !== activeLevel) return false;
    return score(item, q) > 0;
  });

  items.sort((a, b) => score(b, q) - score(a, q));

  if (items.length === 0) {
    grid.innerHTML = `<div class="no-results">
      <div class="nr-emoji">🔍</div>
      <h3>לא נמצאו תוצאות עבור "${query}"</h3>
      <p>נסו מילה אחרת — בעברית, בצ׳כית, או שם הנושא (למשל: Dativ, עבר, se)</p>
    </div>`;
    label.textContent = "0 תוצאות";
    return;
  }

  label.textContent = `${items.length} תוצאות עבור "${query}"`;

  const groups = {};
  items.forEach(item => {
    if (!groups[item.level]) groups[item.level] = [];
    groups[item.level].push(item);
  });

  const levelOrder  = ["a1","a2","b1","b2","c1","gen"];
  const levelLabels = {a1:"A1 — מתחילים", a2:"A2 — יסודי", b1:"B1 — בינוני", b2:"B2 — מתקדם", c1:"C1 — מתקדם+", gen:"כלל"};

  let html = "";
  levelOrder.forEach(lv => {
    if (!groups[lv]) return;
    if (activeLevel === "all") html += `<div class="section-label">${levelLabels[lv]}</div>`;
    groups[lv].forEach(item => {
      const desc = item.text ? snippet(item.text, q) : '';
      html += `<a href="${item.url}" class="result-card">
        <div class="rc-badge ${item.level}">${item.level === "gen" ? "GEN" : item.level.toUpperCase()}</div>
        <div class="rc-body">
          <div class="rc-title">${highlight(item.title, q)}</div>
          <div class="rc-desc">${desc}</div>
        </div>
        <div class="rc-arrow">←</div>
      </a>`;
    });
  });

  grid.innerHTML = html;
}

function clearSearch() {
  document.getElementById("searchInput").value = "";
  query = "";
  render();
  document.getElementById("searchInput").focus();
}

document.getElementById("searchInput").addEventListener("input", function() {
  query = this.value;
  render();
});

document.querySelectorAll(".ltab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".ltab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    activeLevel = tab.dataset.level;
    render();
  });
});

const urlQ = new URLSearchParams(location.search).get("q");
if(urlQ) {
  document.getElementById("searchInput").value = urlQ;
  query = urlQ;
}

render();

// Focus after page settles — prevents the sticky nav from appearing to expand
window.addEventListener('load', () => {
  setTimeout(() => { document.getElementById("searchInput").focus(); }, 100);
});
</script>
